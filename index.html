          </div>
        </div>
        <div style={{fontSize:10,color:t.tm,marginTop:4}}>{t.L.bgHint}</div>
      </div>
      <div style={{marginTop:12,paddingTop:12,borderTop:`1px solid ${t.border}`}}>
        <div style={{fontSize:11,fontWeight:700,color:t.tm,marginBottom:6}}>{t.L.menuTemplates}</div>
        <div style={{display:"flex",gap:6,flexWrap:"wrap",alignItems:"center"}}>
          <select style={{...iSt(t),flex:1,minWidth:140,fontSize:12}} onChange={e=>{
            if(!e.target.value)return;
            const tpl=(menuTemplates||[]).find(x=>x.id===e.target.value);
            if(!tpl)return;
            if(!window.confirm(tr_(t.lang,"templateSaveConfirm",{name:tpl.name}))){e.target.value="";return}
            const{id,name,...tplDesign}=tpl;
            updateMenu({...editMenu,...tplDesign});
            e.target.value="";
          }}>
            <option value="">{t.L.loadTemplate}</option>
            {(menuTemplates||[]).map(tpl=><option key={tpl.id} value={tpl.id}>{tpl.name}</option>)}
          </select>
          <button onClick={()=>{
            const name=window.prompt(t.L.templateName,tr_(t.lang,"defaultTemplateName",{menuName:editMenu.name}));
            if(!name)return;
            const newTpl={
              id:"tpl_"+Date.now(),
              name,
              font:editMenu.font,
              theme:editMenu.theme,
              paperSize:editMenu.paperSize,
              customWidth:editMenu.customWidth,
              customHeight:editMenu.customHeight,
              bgImage:editMenu.bgImage,
              bgOpacity:editMenu.bgOpacity,
              showPrice:editMenu.showPrice,
              showCalorie:editMenu.showCalorie,
              showAllergen:editMenu.showAllergen
            };
            setMenuTemplates([...(menuTemplates||[]),newTpl]);
            alert(tr_(t.lang,"templateSaved",{name}));
          }} style={{...bSt("p",t),fontSize:11}}>{t.L.saveTemplate}</button>
          {(menuTemplates||[]).length>0&&<button onClick={()=>{
            const name=window.prompt("Silinecek şablon ismi?");
            if(!name)return;
            const tpl=(menuTemplates||[]).find(x=>x.name===name);
            if(!tpl){alert(t.L.templateNotFound);return}
            setMenuTemplates(menuTemplates.filter(x=>x.id!==tpl.id));
          }} style={{...bSt("d",t),fontSize:11}}>× {t.L.delete}</button>}
        </div>
        <div style={{fontSize:10,color:t.tm,marginTop:4}}>{t.L.templateHint}</div>
      </div>
    </div>
    {/* Bölümler */}
    {editMenu.sections.map((sec,si)=><div key={si} style={{...cSt(t),padding:"14px 16px",marginBottom:10}}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:10}}>
        <input style={{...iSt(t),fontWeight:700,fontSize:15,border:"none",background:"transparent",padding:0}} value={sec.title} onChange={e=>{const s=[...editMenu.sections];s[si]={...s[si],title:e.target.value};updateMenu({...editMenu,sections:s});}}/>
        <span style={{fontSize:11,color:t.tm}}>{sec.items.length}</span>
      </div>
      {sec.items.map((item,ii)=><div key={ii} style={{background:t.inBg,borderRadius:10,padding:"10px 12px",marginBottom:6}}>
        <div style={{display:"flex",gap:8,marginBottom:6}}>
          <input style={{...iSt(t),flex:1,fontWeight:600,fontSize:14}} value={item.title} placeholder={t.L.menuItemTitle} onChange={e=>{const s=[...editMenu.sections];s[si].items[ii]={...item,title:e.target.value};updateMenu({...editMenu,sections:s});}}/>
          {editMenu.showPrice&&<input style={{...iSt(t),width:80,textAlign:"right"}} value={item.price} placeholder="₺" onChange={e=>{const s=[...editMenu.sections];s[si].items[ii]={...item,price:e.target.value};updateMenu({...editMenu,sections:s});}}/>}
          <button onClick={()=>{const s=[...editMenu.sections];s[si]={...s[si],items:s[si].items.filter((_,j)=>j!==ii)};updateMenu({...editMenu,sections:s});}} style={{...bSt("d",t),padding:"6px 10px",fontSize:11}}>×</button>
        </div>
        <input style={{...iSt(t),fontSize:12}} value={item.description} placeholder={t.L.menuItemDesc} onChange={e=>{const s=[...editMenu.sections];s[si].items[ii]={...item,description:e.target.value};updateMenu({...editMenu,sections:s});}}/>
        {item.allergens.length>0&&<div style={{display:"flex",gap:3,marginTop:6,flexWrap:"wrap"}}>{item.allergens.map(a=><ABadge key={a} a={a} t={t}/>)}</div>}
      </div>)}
      {/* Reçete ekle dropdown */}
      <select style={{...iSt(t),fontSize:13,marginTop:4}} value="" onChange={e=>{if(!e.target.value)return;const recipe=recipes.find(r=>r.id===parseInt(e.target.value));if(recipe)addToSection(editMenu,si,recipe);e.target.value="";}}>
        <option value="">{t.L.menuAutoLoad}...</option>
        {recipes.map(r=><option key={r.id} value={r.id}>{r.name}</option>)}
      </select>
    </div>)}
  </div>;

  // Liste
  return <div>{cropModalJSX}
    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:20}}>
      <h3 style={{fontSize:22,color:t.text}}>{t.L.menus} <span style={{fontSize:14,color:t.tm,fontWeight:400}}>({menus.length})</span></h3>
      <button onClick={()=>setSC(true)} style={{...bSt("p",t),fontSize:13}}>{t.L.newMenu}</button>
    </div>
    {/* Oluşturma modal */}
    {showCreate&&<div style={{...cSt(t),padding:"18px 20px",marginBottom:16}}>
      <div style={{fontSize:14,fontWeight:700,color:t.text,marginBottom:12}}>{t.L.chooseMenuType}</div>
      <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
        {MENU_TYPES.map(mt=><button key={mt.id} onClick={()=>createMenu(mt.id)} style={{...cSt(t),padding:"16px 14px",textAlign:"center",cursor:"pointer",border:`1px solid ${t.inBo}`}}>
          <div style={{fontSize:28,marginBottom:6}}>{mt.icon}</div>
          <div style={{fontSize:14,fontWeight:600,color:t.text}}>{mt.l}</div>
          <div style={{fontSize:10,color:t.tm,marginTop:4}}>{mt.sections.join(" · ")}</div>
        </button>)}
      </div>
      <button onClick={()=>setSC(false)} style={{...bSt("s",t),width:"100%",marginTop:10}}>{t.L.cancel}</button>
    </div>}
    {menus.length===0&&!showCreate&&<div style={{textAlign:"center",padding:"60px 20px",color:t.tm}}>
      <div style={{fontSize:48,opacity:0.4,marginBottom:12}}>📋</div>
      <div style={{fontSize:16,fontFamily:"'Fraunces',serif"}}>{t.L.menus}</div>
      <div style={{fontSize:13,marginTop:6}}>{t.L.emptyStateMenus}</div>
    </div>}
    {menus.map(menu=>{
      const mt=MENU_TYPES.find(x=>x.id===menu.type);
      const itemCount=menu.sections.reduce((a,s)=>a+s.items.length,0);
      return <div key={menu.id} style={{...cSt(t),padding:"16px 18px",marginBottom:10,cursor:"pointer"}} onClick={()=>setEM(menu)}>
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
          <div>
            <div style={{fontSize:11,color:t.tm}}>{mt?.icon} {mt?.l} · {menu.date}</div>
            <div style={{fontSize:17,fontWeight:700,color:t.text,fontFamily:"'Fraunces',serif",marginTop:4}}>{menu.name}</div>
            <div style={{fontSize:12,color:t.tm,marginTop:4}}>{itemCount} · {menu.font} · {MENU_THEMES.find(x=>x.id===menu.theme)?.l}</div>
          </div>
          <div style={{display:"flex",gap:6}}>
            <button onClick={e=>{e.stopPropagation();setPM(menu)}} style={{...bSt("s",t),padding:"6px 10px",fontSize:11}}>👁</button>
            <button onClick={e=>{e.stopPropagation();copyMenu(menu)}} style={{...bSt("s",t),padding:"6px 10px",fontSize:11}}>📋</button>
            <button onClick={e=>{e.stopPropagation();printMenu(menu)}} style={{...bSt("s",t),padding:"6px 10px",fontSize:11}}>🖨</button>
            <button onClick={e=>{e.stopPropagation();setMenus(p=>p.filter(m=>m.id!==menu.id))}} style={{...bSt("d",t),padding:"6px 10px",fontSize:11}}>×</button>
          </div>
        </div>
      </div>;
    })}
  </div>;
};

// ═══ ASSISTANT — Sohbet geçmişi (madde 8-13) ═══
const SK_CHATS="tk_chats";
const AssistantTab=({recipes,stock,apiKey,t})=>{
  const[msgs,setMsgs]=useState([]);
  const[input,setIn]=useState("");
  const[loading,setL]=useState(false);
  const endRef=useRef();
  // Sohbet geçmişi state'leri (madde 8-13)
  const[chatList,setChatList]=useState(()=>LS.get(SK_CHATS,[]));
  const[activeChatId,setActiveChatId]=useState(null);
  const[editingChatId,setEditingChatId]=useState(null);
  const[editName,setEditName]=useState("");
  const[showChatList,setShowChatList]=useState(false);
  const[confirmDelete,setConfirmDelete]=useState(null);

  useEffect(()=>{endRef.current?.scrollIntoView({behavior:"smooth"})},[msgs]);
  useEffect(()=>{LS.set(SK_CHATS,chatList)},[chatList]);

  // Yeni sohbet oluştur (madde 8)
  const newChat=()=>{
    const name="Yeni Sohbet "+new Date().toLocaleDateString("tr-TR",{day:"2-digit",month:"2-digit",hour:"2-digit",minute:"2-digit"});
    const chat={id:Date.now(),name,msgs:[],created:new Date().toISOString(),archived:false};
    setChatList(p=>[chat,...p]);
    setMsgs([]);setActiveChatId(chat.id);setShowChatList(false);
  };

  // Sohbet seç
  const selectChat=(chat)=>{
    setMsgs(chat.msgs||[]);setActiveChatId(chat.id);setShowChatList(false);
  };

  // Otomatik isim (ilk 30 karakter) (madde 9)
  const autoName=(text)=>text.slice(0,30)+(text.length>30?"...":"");

  // Manuel isim düzenleme (madde 10)
  const startEdit=(chat)=>{setEditingChatId(chat.id);setEditName(chat.name);};
  const saveEdit=(id)=>{
    setChatList(p=>p.map(c=>c.id===id?{...c,name:editName||"Sohbet"}:c));
    setEditingChatId(null);
  };

  // Silme (madde 11)
  const deleteChat=(id)=>{
    setChatList(p=>p.filter(c=>c.id!==id));
    if(activeChatId===id){setMsgs([]);setActiveChatId(null);}
    setConfirmDelete(null);
  };

  // Arşivleme + geri alma (madde 12)
  const toggleArchive=(id)=>{
    setChatList(p=>p.map(c=>c.id===id?{...c,archived:!c.archived}:c));
  };

  const send=async()=>{
    if(!input.trim()||loading)return;
    const q=input;setIn("");
    const userMsg={role:"user",text:q};
    setMsgs(p=>[...p,userMsg]);setL(true);
    // Sohbet geçmişini güncelle
    if(activeChatId){
      setChatList(p=>p.map(c=>c.id===activeChatId?{...c,msgs:[...c.msgs,userMsg],updated:new Date().toISOString()}:c));
    }
    try{
      const rl=recipes.map(r=>`${r.id}:${r.name}(${r.cuisine})`).join(", ");
      const sl=stock.map(s=>`${s.name}:${s.qty}${s.unit}`).join(", ");
      const sys=`Kitchen Manager asistanısın. Kısa ve net Türkçe yanıt ver.\nReçeteler: ${rl}\nStok: ${sl}`;
      const raw=await callAI(apiKey,sys,q);
      const aiMsg={role:"assistant",text:raw};
      setMsgs(p=>[...p,aiMsg]);
      if(activeChatId){
        setChatList(p=>p.map(c=>c.id===activeChatId?{...c,msgs:[...c.msgs,aiMsg],updated:new Date().toISOString(),name:autoName(q)}:c));
      }else{
        newChat();
      }
    }catch(e){setMsgs(p=>[...p,{role:"assistant",text:"Hata: "+e.message}])}
    setL(false);
  };

  // Mobil uyumlu liste ↔ sohbet geçişi (madde 13)
  return <div style={{display:"flex",flexDirection:"column",height:"calc(100dvh - 200px)",minHeight:400,paddingBottom:"env(safe-area-inset-bottom)"}}>
    {/* Sohbet listesi başlık */}
    <div style={{display:"flex",gap:8,padding:"0 0 12px",borderBottom:`1px solid ${t.border}`,marginBottom:12}}>
      <button onClick={()=>setShowChatList(!showChatList)} style={{...bSt("s",t),flex:1,fontSize:13}}>☰ Sohbetler ({chatList.filter(c=>!c.archived).length})</button>
      <button onClick={newChat} style={{...bSt("p",t),fontSize:13,padding:"11px 16px"}}>+ Yeni</button>
    </div>

    {/* Sohbet listesi paneli (madde 13 mobil uyumlu) */}
    {showChatList&&<div style={{maxHeight:300,overflowY:"auto",marginBottom:12,...cSt(t)}}>
      {chatList.filter(c=>!c.archived).length===0&&<div style={{textAlign:"center",padding:20,color:t.tm,fontSize:13}}>Henüz sohbet yok</div>}
      {chatList.filter(c=>!c.archived).map(chat=>(
        <div key={chat.id} style={{padding:"10px 12px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",gap:8}}>
          {editingChatId===chat.id?
            <><input value={editName} onChange={e=>setEditName(e.target.value)} style={{...iSt(t),flex:1,fontSize:13}}/>
              <button onClick={()=>saveEdit(chat.id)} style={{...bSt("p",t),padding:"5px 10px",fontSize:12}}>✓</button>
            </>:
            <><div style={{flex:1,cursor:"pointer",overflow:"hidden"}} onClick={()=>selectChat(chat)}>
                <div style={{fontSize:13,fontWeight:600,color:t.text,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{chat.name}</div>
                <div style={{fontSize:11,color:t.tm}}>{chat.msgs?.length||0} mesaj</div>
              </div>
              <button onClick={()=>startEdit(chat)} style={{...bSt("s",t),padding:"4px 8px",fontSize:11}}>✏</button>
            </>}
          <button onClick={()=>toggleArchive(chat.id)} style={{...bSt("s",t),padding:"4px 8px",fontSize:11}}>📦</button>
          <button onClick={()=>setConfirmDelete(chat.id)} style={{...bSt("d",t),padding:"4px 8px",fontSize:11}}>🗑</button>
        </div>
      ))}
      {chatList.filter(c=>c.archived).length>0&&<>
        <div style={{padding:"8px 12px",fontSize:11,color:t.tm,fontWeight:600,background:t.inBg}}>Arşiv ({chatList.filter(c=>c.archived).length})</div>
        {chatList.filter(c=>c.archived).map(chat=>(
          <div key={chat.id} style={{padding:"8px 12px",borderBottom:`1px solid ${t.border}`,display:"flex",alignItems:"center",gap:8,opacity:0.6}}>
            <div style={{flex:1,fontSize:12}}>{chat.name}</div>

    </div>
    <div style={{display:"flex",gap:8}}>
      <input value={input} onChange={e=>setIn(e.target.value)} onKeyDown={e=>{if(e.key==="Enter")send()}} placeholder="Soru sor..." style={{...iSt(t),flex:1}}/>
      <button onClick={send} disabled={loading} style={{...bSt("p",t),padding:"11px 18px"}}>↑</button>
    </div>
  </div>;
};

        <button onClick={()=>setExpenses({...expenses,fixed:expenses.fixed.filter((_,j)=>j!==i)})} style={{...bSt("d",t),padding:"6px 10px",fontSize:11}}>×</button>
      </div>)}
      <button onClick={()=>setExpenses({...expenses,fixed:[...expenses.fixed,{name:"",amount:0}]})} style={{...bSt("s",t),fontSize:12,width:"100%",marginTop:4}}>{t.L.addFixed}</button>

      <div style={{fontSize:12,fontWeight:700,color:t.tm,marginTop:16,marginBottom:8}}>{t.L.personnel}</div>
      {expenses.personnel.map((p,i)=><div key={i} style={{display:"flex",gap:6,marginBottom:6}}>
        <input style={{...iSt(t),flex:2}} placeholder={t.L.settingsPersonnelName} value={p.name} onChange={e=>{const a=[...expenses.personnel];a[i]={...p,name:e.target.value};setExpenses({...expenses,personnel:a})}}/>
        <input style={{...iSt(t),flex:2}} placeholder={t.L.role} value={p.role||""} onChange={e=>{const a=[...expenses.personnel];a[i]={...p,role:e.target.value};setExpenses({...expenses,personnel:a})}}/>
        <input style={{...iSt(t),flex:1,textAlign:"right"}} type="number" placeholder="₺" value={p.salary||""} onChange={e=>{const a=[...expenses.personnel];a[i]={...p,salary:parseFloat(e.target.value)||0};setExpenses({...expenses,personnel:a})}}/>
        <button onClick={()=>setExpenses({...expenses,personnel:expenses.personnel.filter((_,j)=>j!==i)})} style={{...bSt("d",t),padding:"6px 10px",fontSize:11}}>×</button>
      </div>)}
      <button onClick={()=>setExpenses({...expenses,personnel:[...expenses.personnel,{name:"",role:"",salary:0}]})} style={{...bSt("s",t),fontSize:12,width:"100%",marginTop:4}}>{t.L.addPersonnel}</button>

      <div style={{marginTop:16,padding:"10px 12px",background:t.acB,borderRadius:10}}>
        <label style={{fontSize:11,fontWeight:700,color:t.accent}}>{t.L.monthlyPortions}</label>
        <input type="number" min="1" value={expenses.monthlyPortions||1000} onChange={e=>setExpenses({...expenses,monthlyPortions:Math.max(1,parseInt(e.target.value)||1000)})} style={{...iSt(t),marginTop:4,textAlign:"center",fontWeight:700}}/>
        <div style={{fontSize:10,color:t.tm,marginTop:4}}>{t.L.portionHint}</div>
      </div>

      {(()=>{
        const totalFixed=expenses.fixed.reduce((a,x)=>a+(x.amount||0),0);
        const totalPersonnel=expenses.personnel.reduce((a,x)=>a+(x.salary||0),0);
        const total=totalFixed+totalPersonnel;
        const mp=expenses.monthlyPortions||1000;
        const perPortion=total/mp;
        return <div style={{marginTop:12,padding:"10px 12px",background:t.waBg,border:`1px solid ${t.waBo}`,borderRadius:10}}>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:t.warn}}><span>{t.L.fixedTotal}</span><span style={{fontWeight:700}}>₺{totalFixed.toLocaleString("tr-TR")}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:12,color:t.warn}}><span>{t.L.personnelTotal}</span><span style={{fontWeight:700}}>₺{totalPersonnel.toLocaleString("tr-TR")}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:14,color:t.warn,fontWeight:700,borderTop:`1px solid ${t.waBo}`,marginTop:6,paddingTop:6}}><span>{t.L.monthlyTotal}</span><span>₺{total.toLocaleString("tr-TR")}</span></div>
          <div style={{display:"flex",justifyContent:"space-between",fontSize:13,color:t.warn,marginTop:4}}><span>{t.L.perPortionShare}</span><span style={{fontWeight:700}}>₺{perPortion.toFixed(2)}</span></div>
        </div>;
      })()}
    </div>

    <h3 style={{fontSize:20,marginBottom:12,color:t.text}}>{t.L.storageAreas}</h3>
    <div style={{...cSt(t),padding:"14px 16px",marginBottom:24}}>
      {storageAreas.map((s,i)=><div key={s.id} style={{display:"flex",gap:6,marginBottom:8,alignItems:"center"}}>
        <span style={{fontSize:20}}>{STORAGE_TYPES.find(x=>x.id===s.type)?.icon||"📦"}</span>
        <input style={{...iSt(t),flex:2}} placeholder={t.L.settingsStorageName} value={s.name} onChange={e=>{const a=[...storageAreas];a[i]={...s,name:e.target.value};setStorageAreas(a)}}/>
        <select style={{...iSt(t),flex:2}} value={s.type} onChange={e=>{const a=[...storageAreas];const typ=STORAGE_TYPES.find(x=>x.id===e.target.value);a[i]={...s,type:e.target.value,temp:typ?typ.defaultTemp:s.temp};setStorageAreas(a)}}>
          {STORAGE_TYPES.map(typ=><option key={typ.id} value={typ.id}>{typ.icon} {typ.l}</option>)}
        </select>
        <input style={{...iSt(t),width:70,textAlign:"center"}} type="number" placeholder="°C" value={s.temp} onChange={e=>{const a=[...storageAreas];a[i]={...s,temp:parseFloat(e.target.value)||0};setStorageAreas(a)}}/>
        <button onClick={()=>setStorageAreas(storageAreas.filter((_,j)=>j!==i))} style={{...bSt("d",t),padding:"6px 10px",fontSize:11}}>×</button>
      </div>)}
      <button onClick={()=>setStorageAreas([...storageAreas,{id:"st"+Date.now(),name:t.L.settingsStorageName,type:"fridge",temp:4,capacity:null}])} style={{...bSt("s",t),fontSize:12,width:"100%",marginTop:4}}>{t.L.addStorage}</button>
      <div style={{fontSize:10,color:t.tm,marginTop:8,lineHeight:1.5}}>{t.L.storageHint}</div>
    </div>

    <h3 style={{fontSize:20,marginBottom:12,color:t.text}}>{t.L.backup}</h3>
    <div style={{display:"flex",gap:8,marginBottom:24}}>
      <button onClick={backup} style={{...bSt("p",t),flex:1}}>{t.L.backupBtn}</button>
      <input ref={fileRef} type="file" accept=".json" style={{display:"none"}} onChange={e=>{if(e.target.files[0])restore(e.target.files[0])}}/>
      <button onClick={()=>fileRef.current.click()} style={{...bSt("s",t),flex:1}}>{t.L.restoreBtn}</button>
    </div>
    <h3 style={{fontSize:20,marginBottom:12,color:t.text}}>{t.L.developer}</h3>
    <button onClick={exportLogs} style={{...bSt("s",t),width:"100%",marginBottom:24}}>{t.L.copyLogs} ({LOGS.length})</button>
    <div style={{textAlign:"center",fontSize:12,color:t.tm}}>Kitchen Manager v1.9.0 — Tulpar Kitchen Software</div>
  </div>;
};

// ═══ MAIN ═══
function App(){
  const[apiKey,setApiKey]=useState(LS.get(SK.key,""));
  const[dark,setDark]=useState(LS.get(SK.dark,false));
  const[lang,setLang]=useState(LS.get(SK.lang,"tr"));
  const[tab,setTab]=useState("recipes");
  const[recipes,setRecipes]=useState(()=>{
    const raw=LS.get(SK.recipes,DEF_RECIPES);
    return raw.map(r=>({...r,totalWeight:r.totalWeight||0}));
  });
  const[stock,setStock]=useState(()=>{
    const raw=LS.get(SK.stock,DEF_STOCK);
    // Migration: eski kategori → yeni kategori
    return raw.map(migrateStockCat);
  });
  const[invoices,setInvoices]=useState(LS.get(SK.invoices,[]));
  const[menus,setMenus]=useState(LS.get(SK.menus,[]));
  const[expenses,setExpenses]=useState(LS.get(SK.expenses,DEF_EXPENSES));
  const[storageAreas,setStorageAreas]=useState(LS.get(SK.storage,DEF_STORAGE));
  const[productions,setProductions]=useState(LS.get(SK.productions,[]));
  const[reportCats,setReportCats]=useState(LS.get(SK.reportCats,DEF_REPORT_CATS));
  const[profile,setProfile]=useState(LS.get(SK.profile,DEF_PROFILE));
  const[traceability,setTraceability]=useState(LS.get(SK.traceability,false));
  const[lots,setLots]=useState(LS.get(SK.lots,{}));
  const[trackedIngs,setTrackedIngs]=useState(LS.get(SK.trackedIngs,[]));
  const[resetHour,setResetHour]=useState(LS.get(SK.resetHour,23));
  const[organizations,setOrganizations]=useState(LS.get(SK.organizations,DEF_ORGANIZATIONS));
  const[storageChecks,setStorageChecks]=useState(LS.get(SK.storageChecks,[]));
  const[menuTemplates,setMenuTemplates]=useState(LS.get(SK.menuTemplates,[]));
  // Bildirim ayarları (madde 14-18)
  const[notifSettings,setNotifSettings]=useState(()=>LS.get(SK.notifications,{
    enabled:true,
    storageCheckTimes:[9,15,21], // 09:05, 15:05, 21:05
    sktAlert:true,
    lowStockAlert:true,
    lotReminder:true
  }));
  const[botMsgs,setBotMsgs]=useState([]);
  const[showBotPanel,setShowBotPanel]=useState(false);
  const[notifCount,setNotifCount]=useState(0);
  const[showNotif,setShowNotif]=useState(false);
  // Yazıcı ayarları (madde 31-33)
  const[printerSettings,setPrinterSettings]=useState(()=>LS.get("tk_printer",{
    connectionType:"wifi",
    printerIp:"",
    printerName:"",
    autoSelect:false,
    areaPrinters:{mutfak:"",depo:"",bar:""}
  }));
  const[mainCat,setMC]=useState("all");const[subCat,setSC]=useState("all");
  // Akıllı arama: metin + diyet filtresi + alerjen hariç tutma (madde 3)
  const[search,setSearch]=useState("");
  const[dietFilter,setDF]=useState([]);       // OR mantığı: bunlardan EN AZ biri olsun
  const[showFilters,setShowFilters]=useState(false);
  const[allergenExclude,setAE]=useState([]);  // bunlar OLMAYAN reçeteler
  const[showAdd,setSAdd]=useState(false);
  const[activeR,setAR]=useState(null);const[editR,setER]=useState(null);

  const t=useMemo(()=>{
    const baseTheme=dark?THEMES.dark:THEMES.light;
    return {...baseTheme,L:I18N[lang]||I18N.tr,lang,rtl:lang==="ar"};
  },[dark,lang]);

  useEffect(()=>{LS.set(SK.key,apiKey)},[apiKey]);
  useEffect(()=>{LS.set(SK.dark,dark);document.body.className=dark?"dark":""},[dark]);
  useEffect(()=>{LS.set(SK.lang,lang);document.documentElement.dir=lang==="ar"?"rtl":"ltr";document.documentElement.lang=lang},[lang]);
  useEffect(()=>{LS.set(SK.recipes,recipes)},[recipes]);
  useEffect(()=>{LS.set(SK.stock,stock)},[stock]);
  useEffect(()=>{LS.set(SK.invoices,invoices)},[invoices]);
  useEffect(()=>{LS.set(SK.menus,menus)},[menus]);
  useEffect(()=>{LS.set(SK.expenses,expenses)},[expenses]);
  useEffect(()=>{LS.set(SK.storage,storageAreas)},[storageAreas]);
  useEffect(()=>{LS.set(SK.productions,productions)},[productions]);
  useEffect(()=>{LS.set(SK.reportCats,reportCats)},[reportCats]);
  useEffect(()=>{LS.set(SK.profile,profile)},[profile]);
  useEffect(()=>{LS.set(SK.traceability,traceability)},[traceability]);
  useEffect(()=>{LS.set(SK.lots,lots)},[lots]);
  useEffect(()=>{LS.set(SK.trackedIngs,trackedIngs)},[trackedIngs]);
  useEffect(()=>{LS.set(SK.resetHour,resetHour)},[resetHour]);
  useEffect(()=>{LS.set(SK.organizations,organizations)},[organizations]);
  useEffect(()=>{LS.set(SK.storageChecks,storageChecks)},[storageChecks]);
  useEffect(()=>{LS.set(SK.notifications,notifSettings)},[notifSettings]);
  // Bot bildirim sistemi (madde 14-18)
  useEffect(()=>{
    if(!notifSettings.enabled)return;
    const checkNotifications=()=>{
      const now=new Date();
      const h=now.getHours();
      const m=now.getMinutes();
      const newMsgs=[];
      // Depo kontrol hatırlatması (09:05, 15:05, 21:05)
      if(notifSettings.storageCheckTimes.includes(h)&&m>=0&&m<10){
        const incompleteChecks=storageChecks.filter(c=>{
          const d=new Date(c.ts);return d.toDateString()===now.toDateString()&&!c.complete;
        }).length;
        if(incompleteChecks>0){
          newMsgs.push({icon:"📋",title:"Depo Kontrol",body:`${incompleteChecks} kontrol yapılmadı`,time:now.getTime()});
        }
      }
      // SKT geçen ürün bildirimi (madde 15)
      if(notifSettings.sktAlert){
        const nowDate=new Date().toISOString().split("T")[0];
        const expiredStock=stock.filter(s=>s.expires&&s.expires<nowDate);
        if(expiredStock.length>0){
          newMsgs.push({icon:"⚠️",title:"SKT Geçti",body:`${expiredStock.length} ürünün SKT'si geçti: ${expiredStock.map(s=>s.name).slice(0,3).join(", ")}${expiredStock.length>3?"...":""}`,time:now.getTime()});
        }
      }
      // Düşük stok bildirimi (madde 16)
      if(notifSettings.lowStockAlert){
        const lowStockItems=stock.filter(s=>s.qty<=(s.low||100));
        if(lowStockItems.length>0){
          newMsgs.push({icon:"📦",title:"Düşük Stok",body:`${lowStockItems.length} ürün düşük stok: ${lowStockItems.map(s=>s.name).slice(0,3).join(", ")}${lowStockItems.length>3?"...":""}`,time:now.getTime()});
        }
      }
      // Parti no hatırlatma (madde 17)
      if(notifSettings.lotReminder){
        const missingLots=(trackedIngs||[]).filter(ti=>!lots[ti]?.no).length;
        if(missingLots>0){
          newMsgs.push({icon:"🏷️",title:"Parti No Eksik",body:`${missingLots} takip edilen malzeme için parti no girilmedi`,time:now.getTime()});
        }
      }
      if(newMsgs.length>0){
        setBotMsgs(p=>[...newMsgs,...p].slice(0,50));
        setNotifCount(c=>c+newMsgs.length);
      }
    };
    checkNotifications();
    const interval=setInterval(checkNotifications,600000); // 10 dakikada bir kontrol
    return()=>clearInterval(interval);
  },[notifSettings.enabled,notifSettings.storageCheckTimes,notifSettings.sktAlert,notifSettings.lowStockAlert,notifSettings.lotReminder,storageChecks,stock,lots,trackedIngs]);
  useEffect(()=>{LS.set(SK.menuTemplates,menuTemplates)},[menuTemplates]);

  // Gün sonu otomatik parti no sıfırlama
  useEffect(()=>{
    const checkReset=()=>{
      const now=new Date();
      const lastReset=LS.get("tk_lastreset",null);
      const today=`${now.getFullYear()}-${now.getMonth()}-${now.getDate()}`;
      if(now.getHours()>=resetHour&&lastReset!==today){
        // Tüm parti no'ları sıfırla
        setLots({});
        LS.set("tk_lastreset",today);
      }
    };
    checkReset();
    const id=setInterval(checkReset,60000); // her dakika kontrol
    return()=>clearInterval(id);
  },[resetHour]);
  useEffect(()=>{document.body.style.background=t.bg;document.body.style.color=t.text},[t]);

  const filtered=useMemo(()=>recipes.filter(r=>{
    if(mainCat!=="all"&&r.mainCat!==mainCat)return false;
    if(subCat!=="all"&&r.subCat!==subCat)return false;
    if(search.trim()){
      const q=search.toLowerCase();
      const nameMatch=r.name.toLowerCase().includes(q);
      const ingMatch=r.ingredients.some(i=>i.name.toLowerCase().includes(q));
      const noteMatch=(r.notes||"").toLowerCase().includes(q);
      const dietMatch=(r.diets||[]).some(d=>{const di=DIETS.find(x=>x.id===d);return di&&di.l.toLowerCase().includes(q);});
      const allergenMatch=(r.allergens||[]).some(a=>{const al=ALLERGENS.find(x=>x.id===a);return al&&al.l.toLowerCase().includes(q);});
      const cuisineMatch=(CUISINES.find(c=>c.id===r.cuisine)?.l||"").toLowerCase().includes(q);
      if(!nameMatch&&!ingMatch&&!noteMatch&&!dietMatch&&!allergenMatch&&!cuisineMatch)return false;
    }
    // Diyet filtresi: seçili diyetlerin HEPSI reçetede olmalı
    if(dietFilter.length>0&&!dietFilter.every(d=>(r.diets||[]).includes(d)))return false;
    // Alerjen hariç tutma: seçili alerjenlerden HERHANGİ BİRİ varsa gösterme
    if(allergenExclude.length>0&&allergenExclude.some(a=>(r.allergens||[]).includes(a)))return false;
    return true;
  }),[recipes,mainCat,subCat,search,dietFilter,allergenExclude]);

  // STOKTAN DÜŞME BUG FIX (madde 8):
  // Orijinal bug: parseFloat ile miktar çıkarmak TR sayı formatını dikkate almıyordu
  // ve stok match çok kısıtlıydı — ilk kelime eşleşmesi yeterliydi
  // Fix: hem TR hem EN format, daha iyi ad eşleşmesi, negatife düşmeme
  const deductStock=useCallback((r,m=1)=>{
    setStock(prev=>{
      let next=[...prev];
      for(const ing of r.ingredients){
        const nmMatch=ing.amount.match(/[\d.,]+/);
        if(!nmMatch)continue;
        const amStr=nmMatch[0];
        // normalize: TR virgüllü sayı desteği
        const am=parseFloat(amStr.replace(/\./g,"").replace(",","."))*m;
        if(isNaN(am)||am<=0)continue;
        const ingNameLower=ing.name.toLowerCase();
        const idx=next.findIndex(s=>{
          const sLower=s.name.toLowerCase();
          return ingNameLower.includes(sLower)||sLower.includes(ingNameLower)||
            ingNameLower.split(" ").some(w=>w.length>2&&sLower.includes(w));
        });
        if(idx>=0){
          next=next.map((s,i)=>i===idx?{...s,qty:Math.max(0,Math.round((s.qty-am)*1000)/1000)}:s);
        }
      }
      return next;
    });
  },[]);

  if(!apiKey)return <KeyModal onSave={setApiKey} t={t}/>;

  const subs=mainCat!=="all"?(SUB_CATS[mainCat]||[]):[];
  const baseTabs=[{id:"recipes",l:t.L.tabRecipes,i:"🍽"},{id:"stock",l:t.L.tabStock,i:"📦"},{id:"production",l:t.L.tabProduction,i:"🍱"}];
  const traceTabs=traceability?[{id:"reports",l:t.L.tabReports,i:"📊"}]:[];
  const endTabs=[{id:"menus",l:t.L.tabMenus,i:"📋"},{id:"assistant",l:t.L.tabAssistant,i:"💬"},{id:"settings",l:t.L.tabSettings,i:"⚙"}];
  const tabs=[...baseTabs,...traceTabs,...endTabs];
  const lowCount=stock.filter(s=>s.qty<=(s.low||100)).length;

  return <div style={{minHeight:"100vh",background:t.bg,paddingBottom:80}}>
    <div style={{background:t.topBar,backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderBottom:`1px solid ${t.border}`,padding:"0 16px",position:"sticky",top:0,zIndex:100}}>
      <div className="app" style={{display:"flex",alignItems:"center",justifyContent:"space-between",height:54}}>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <Logo size={32} c={t.accent}/>
          <div><div style={{fontSize:18,fontFamily:"'Fraunces',serif",color:t.text,fontWeight:700,lineHeight:1}}>Kitchen Manager</div>
          <div style={{fontSize:9,color:t.accent,letterSpacing:"0.15em",fontWeight:600}}>TULPAR SOFTWARE</div></div>
        </div>
        <div style={{display:"flex",alignItems:"center",gap:8}}>
          {/* Bildirim butonu (madde 14-18) */}
          <button onClick={()=>setShowNotif(!showNotif)} style={{background:"none",border:"none",cursor:"pointer",position:"relative",padding:8,borderRadius:20,color:t.text,display:"flex",alignItems:"center",justifyContent:"center"}}>
            <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
              <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
              <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
            </svg>
            {notifCount>0&&<div style={{position:"absolute",top:2,right:2,background:"#ef4444",color:"white",borderRadius:10,fontSize:10,fontWeight:700,padding:"2px 5px",minWidth:18,textAlign:"center"}}>{notifCount>99?"99+":notifCount}</div>}
          </button>
          {tab==="recipes"&&<button onClick={()=>setSAdd(true)} style={{...bSt("p",t),padding:"7px 14px",fontSize:13}}>{t.L.stockAddBtn}</button>}
        </div>
      </div>
    </div>

    {/* Bildirim Paneli Dropdown (madde 14-18) */}
    {showNotif&&<div style={{position:"fixed",top:62,right:16,zIndex:200,background:t.card,borderRadius:16,boxShadow:"0 8px 32px rgba(0,0,0,0.18)",border:`1px solid ${t.border}`,width:340,maxHeight:"70vh",overflow:"auto"}}>
      <div style={{padding:"14px 16px",borderBottom:`1px solid ${t.border}`,display:"flex",justifyContent:"space-between",alignItems:"center"}}>
        <span style={{fontSize:15,fontWeight:700,color:t.text}}>{t.L.notifications||"Bildirimler"}</span>
        <button onClick={()=>setShowNotif(false)} style={{background:"none",border:"none",cursor:"pointer",color:t.tm,padding:4}}>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>
      {botMsgs.length===0?<div style={{padding:"30px 16px",textAlign:"center",color:t.tm}}>
        <div style={{fontSize:32,opacity:0.4,marginBottom:8}}>🔔</div>
        <div style={{fontSize:13}}>Henüz bildirim yok</div>
      </div>:<div style={{padding:"8px"}}>
        {botMsgs.slice().reverse().map((msg,i)=>(
          <div key={i} style={{padding:"10px 12px",borderRadius:10,marginBottom:6,background:msg.read?t.bg:t.accent+"12",display:"flex",gap:10,alignItems:"flex-start"}}>
            <span style={{fontSize:20,marginTop:2}}>{msg.icon||"🔔"}</span>
            <div style={{flex:1}}>
              <div style={{fontSize:13,fontWeight:600,color:t.text,marginBottom:3}}>{msg.title||"Bildirim"}</div>
              <div style={{fontSize:12,color:t.tm,lineHeight:1.4}}>{msg.body}</div>
              {msg.time&&<div style={{fontSize:10,color:t.tm,marginTop:4,opacity:0.7}}>{new Date(msg.time).toLocaleString("tr-TR")}</div>}
            </div>
          </div>
        ))}
      </div>}
      {botMsgs.length>0&&<div style={{padding:"8px 16px 14px",borderTop:`1px solid ${t.border}`}}>
        <button onClick={()=>{setBotMsgs([]);setNotifCount(0);setShowNotif(false)}} style={{width:"100%",padding:"8px",borderRadius:8,border:`1px solid ${t.border}`,background:"transparent",color:t.tm,fontSize:12,cursor:"pointer"}}>
          Tümünü Temizle
        </button>
      </div>}
    </div>}

    <div className="app" style={{padding:"20px 16px"}}>
      {tab==="recipes"&&<>
        {/* Arama + filtre toggle */}
        <div style={{display:"flex",gap:8,marginBottom:10}}>
          <input value={search} onChange={e=>setSearch(e.target.value)} placeholder={"🔍 "+t.L.search+"..."} style={{...iSt(t),flex:1}}/>
          <button onClick={()=>setShowFilters(!showFilters)} style={{...bSt(showFilters?"p":"s",t),padding:"11px 14px",fontSize:13,whiteSpace:"nowrap"}}>
            🔽 {t.L.filter}{(dietFilter.length+allergenExclude.length)>0?` (${dietFilter.length+allergenExclude.length})`:""}
          </button>
        </div>
        {showFilters&&<div style={{...cSt(t),padding:"12px 14px",marginBottom:10}}>
          <div style={{fontSize:10,color:t.tm,fontWeight:700,marginBottom:6,letterSpacing:"0.1em"}}>DİYET (DAHIL ET)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5,marginBottom:12}}>
            {DIETS.map(d=>{const on=dietFilter.includes(d.id);return <button key={d.id} onClick={()=>setDF(on?dietFilter.filter(x=>x!==d.id):[...dietFilter,d.id])} style={{padding:"5px 11px",borderRadius:14,fontSize:11,fontWeight:600,border:`1px solid ${on?t.success:t.inBo}`,background:on?t.sucBg:"transparent",color:on?t.success:t.tm,cursor:"pointer"}}>{d.icon} {d.l}</button>})}
          </div>
          <div style={{fontSize:10,color:t.tm,fontWeight:700,marginBottom:6,letterSpacing:"0.1em"}}>ALERJEN (HARİÇ TUT)</div>
          <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
            {ALLERGENS.map(a=>{const on=allergenExclude.includes(a.id);return <button key={a.id} onClick={()=>setAE(on?allergenExclude.filter(x=>x!==a.id):[...allergenExclude,a.id])} style={{padding:"5px 11px",borderRadius:14,fontSize:11,fontWeight:600,border:`1px solid ${on?a.c:t.inBo}`,background:on?a.c+"15":"transparent",color:on?a.c:t.tm,cursor:"pointer"}}>{a.icon} {a.l}</button>})}
          </div>
        </div>}
        <div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:8}}>
          {MAIN_CATS.map(c=><button key={c.id} onClick={()=>{setMC(c.id);setSC("all")}} style={{whiteSpace:"nowrap",padding:"7px 14px",borderRadius:20,fontSize:13,fontWeight:500,border:"1px solid",background:mainCat===c.id?t.pA:"transparent",color:mainCat===c.id?t.pAT:t.ts,borderColor:mainCat===c.id?t.pA:t.inBo,cursor:"pointer"}}>{c.icon} {c.label}</button>)}
        </div>
        {subs.length>0&&<div style={{display:"flex",gap:6,overflowX:"auto",paddingBottom:6,marginBottom:14}}>
          <button onClick={()=>setSC("all")} style={{whiteSpace:"nowrap",padding:"5px 12px",borderRadius:16,fontSize:12,fontWeight:500,border:`1px solid ${subCat==="all"?t.acBo:t.inBo}`,background:subCat==="all"?t.acB:"transparent",color:subCat==="all"?t.accent:t.tm,cursor:"pointer"}}>Tümü</button>
          {subs.map(s=><button key={s.id} onClick={()=>setSC(s.id)} style={{whiteSpace:"nowrap",padding:"5px 12px",borderRadius:16,fontSize:12,fontWeight:500,border:`1px solid ${subCat===s.id?t.acBo:t.inBo}`,background:subCat===s.id?t.acB:"transparent",color:subCat===s.id?t.accent:t.tm,cursor:"pointer"}}>{s.label}</button>)}
        </div>}
        <div style={{fontSize:12,color:t.tm,marginBottom:14}}>{filtered.length} reçete{(dietFilter.length>0||allergenExclude.length>0)&&<span style={{color:t.accent,marginLeft:6}}>· filtreli</span>}</div>
        {filtered.length===0?<div style={{textAlign:"center",padding:"60px 20px",color:t.tm}}>
          <div style={{fontSize:48,opacity:0.4,marginBottom:12}}>🍽</div>
          <div style={{fontSize:16,fontFamily:"'Fraunces',serif"}}>Reçete bulunamadı</div>
        </div>:<div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:12}}>
          {filtered.map(r=><RCard key={r.id} r={r} onClick={setAR} t={t}/>)}
        </div>}
      </>}
      {tab==="stock"&&<StockTab stock={stock} setStock={setStock} invoices={invoices} setInvoices={setInvoices} apiKey={apiKey} traceability={traceability} lots={lots} setLots={setLots} trackedIngs={trackedIngs} profile={profile} t={t}/>}
      {tab==="production"&&<ProductionTab productions={productions} setProductions={setProductions} storageAreas={storageAreas} reportCats={reportCats} setReportCats={setReportCats} profile={profile} traceability={traceability} setTab={setTab} storageChecks={storageChecks} setStorageChecks={setStorageChecks} t={t}/>}
      {tab==="reports"&&<ProductionTab productions={productions} setProductions={setProductions} storageAreas={storageAreas} reportCats={reportCats} setReportCats={setReportCats} profile={profile} traceability={traceability} setTab={setTab} storageChecks={storageChecks} setStorageChecks={setStorageChecks} initialShowReports={true} t={t}/>}
      {tab==="menus"&&<MenuTab menus={menus} setMenus={setMenus} recipes={recipes} menuTemplates={menuTemplates} setMenuTemplates={setMenuTemplates} t={t}/>}
      {tab==="assistant"&&<AssistantTab recipes={recipes} stock={stock} apiKey={apiKey} t={t}/>}
      {tab==="settings"&&<SettingsTab apiKey={apiKey} setApiKey={setApiKey} dark={dark} setDark={setDark} lang={lang} setLang={setLang} recipes={recipes} stock={stock} invoices={invoices} setRecipes={setRecipes} setStock={setStock} setInvoices={setInvoices} expenses={expenses} setExpenses={setExpenses} storageAreas={storageAreas} setStorageAreas={setStorageAreas} profile={profile} setProfile={setProfile} traceability={traceability} setTraceability={setTraceability} trackedIngs={trackedIngs} setTrackedIngs={setTrackedIngs} resetHour={resetHour} setResetHour={setResetHour} organizations={organizations} setOrganizations={setOrganizations} notifSettings={notifSettings} setNotifSettings={setNotifSettings} printerSettings={printerSettings} setPrinterSettings={setPrinterSettings} t={t}/>}
    </div>

    <div style={{position:"fixed",bottom:0,left:0,right:0,background:t.topBar,backdropFilter:"blur(16px)",WebkitBackdropFilter:"blur(16px)",borderTop:`1px solid ${t.border}`,zIndex:100,padding:"6px 0 calc(env(safe-area-inset-bottom) + 8px)"}}>
      <div className="app" style={{display:"flex",justifyContent:"space-around"}}>
        {tabs.map(tb=><button key={tb.id} onClick={()=>setTab(tb.id)} style={{position:"relative",background:"none",border:"none",cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2,padding:"6px 12px",color:tab===tb.id?t.accent:t.tm}}>
          <span style={{fontSize:20}}>{tb.i}</span>
          <span style={{fontSize:10,fontWeight:600}}>{tb.l}</span>
          {tb.id==="stock"&&lowCount>0&&<div style={{position:"absolute",top:2,right:8,width:8,height:8,borderRadius:4,background:t.danger}}/>}
        </button>)}
      </div>
    </div>

    {showAdd&&<AddModal onClose={()=>setSAdd(false)} onAdd={r=>setRecipes(p=>[r,...p])} apiKey={apiKey} t={t}/>}
    {activeR&&!editR&&<Detail r={activeR} onClose={()=>setAR(null)} onDel={id=>{setRecipes(p=>p.filter(r=>r.id!==id));setAR(null)}} onEdit={r=>{if(r._photoOnly){const clean={...r};delete clean._photoOnly;setRecipes(p=>p.map(x=>x.id===clean.id?clean:x));setAR(clean);}else{setER(r);setAR(null);}}} onDeduct={deductStock} stock={stock} expenses={expenses} storageAreas={storageAreas} productions={productions} setProductions={setProductions} profile={profile} organizations={organizations} lots={lots} trackedIngs={trackedIngs} traceability={traceability} t={t}/>}
    {editR&&<div style={mOv(t)} onClick={()=>setER(null)}><div onClick={e=>e.stopPropagation()} style={mPn(t)}>
      <h3 style={{fontSize:22,marginBottom:18,color:t.text}}>Düzenle</h3>
      <EditForm init={editR} onSave={f=>{setRecipes(p=>p.map(r=>r.id===f.id?f:r));setER(null);setAR(null)}} onCancel={()=>setER(null)} t={t}/>
    </div></div>}
  </div>;
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
